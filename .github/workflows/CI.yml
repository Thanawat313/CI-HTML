name: HTML Security & Docker Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read      
  security-events: write  
  actions: read

jobs:
  # 1. Linting & Health Check (แทนที่ Build & Test)
  lint-and-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: HTML Hint (Check for syntax errors)
        # ใช้เครื่องมือตรวจสอบโครงสร้าง HTML เบื้องต้น
        run: |
          npx htmlhint "index.html"

  # 2. Security Scan (SAST)
  security-scan:
    needs: lint-and-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          # สำหรับ HTML เราจะใช้ javascript เพื่อให้ CodeQL ตรวจสอบ Inline script (ถ้ามี)
          languages: 'javascript-typescript' 
          
      - name: Perform Analysis
        uses: github/codeql-action/analyze@v3

    # 3. Build Image & Scan
  container-security:
    needs: security-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Docker Image
        # Build image เตรียมไว้สำหรับการสแกน
        run: docker build -t my-html-app:${{ github.sha }} .

      - name: Run Trivy Scan (Direct Docker Run)
        # ใช้ Docker Image ของ Trivy โดยตรง (ไม่ต้องใช้ uses: ...)
        # วิธีนี้จะดึงเครื่องมือสแกนจาก Docker Hub มาทำงานทันที
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:latest \
            image --severity CRITICAL,HIGH --exit-code 0 my-html-app:${{ github.sha }}
    # 4. Deployment (CD) บนเครื่อง Local
  deploy-local:
    needs: container-security # ต้องผ่านการ Scan ทั้งหมดก่อน
    if: github.ref == 'refs/heads/main' # Deploy เฉพาะตอน push เข้า main เท่านั้น
    runs-on: self-hosted # <--- สั่งให้งานนี้รันที่เครื่องคอมพิวเตอร์ของคุณ
    steps:
      - uses: actions/checkout@v4

      - name: Deploy HTML App to Local Docker
        run: |
          # 1. Build Image ใหม่ในเครื่อง
          docker build -t my-html-app:latest .
          
          # 2. เช็กว่ามี Container เก่ารันอยู่ไหม ถ้ามีให้ลบทิ้งก่อน
          docker stop my-site-container || true
          docker rm my-site-container || true
          
          # 3. รัน Container ใหม่ที่ Port 8080
          docker run -d \
            --name my-site-container \
            -p 8080:80 \
            --restart always \
            my-html-app:latest

      - name: Check Status
        run: docker ps | grep my-site-container