name: HTML Security & Docker Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read      
  security-events: write  
  actions: read

jobs:
  # 1. Linting & Health Check (แทนที่ Build & Test)
  lint-and-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: HTML Hint (Check for syntax errors)
        # ใช้เครื่องมือตรวจสอบโครงสร้าง HTML เบื้องต้น
        run: |
          npx htmlhint "index.html"

  # 2. Security Scan (SAST)
  security-scan:
    needs: lint-and-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          # สำหรับ HTML เราจะใช้ javascript เพื่อให้ CodeQL ตรวจสอบ Inline script (ถ้ามี)
          languages: 'javascript-typescript' 
          
      - name: Perform Analysis
        uses: github/codeql-action/analyze@v3

    # 3. Build Image & Scan
  container-security:
    needs: security-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Docker Image
        # Build image เตรียมไว้สำหรับการสแกน
        run: docker build -t my-html-app:${{ github.sha }} .

      - name: Run Trivy Scan (Direct Docker Run)
        # ใช้ Docker Image ของ Trivy โดยตรง (ไม่ต้องใช้ uses: ...)
        # วิธีนี้จะดึงเครื่องมือสแกนจาก Docker Hub มาทำงานทันที
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:latest \
            image --severity CRITICAL,HIGH --exit-code 0 my-html-app:${{ github.sha }}
    # 4. Deployment (CD) บนเครื่อง Local Windows
  deploy-local:
    needs: container-security
    if: github.ref == 'refs/heads/main'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Deploy HTML App to Local Docker (Windows Host)
        # ใช้ shell: pwsh เพื่อบังคับให้รันด้วย PowerShell ที่เสถียรกว่า
        shell: pwsh
        run: |
          # 1. Build Image ในเครื่อง
          docker build -t my-html-app:latest .
          
          # 2. เช็กและลบ Container เก่า (เขียนแบบ PowerShell)
          $container = docker ps -aq --filter "name=my-site-container"
          if ($container) {
              Write-Host "Stopping and removing existing container..."
              docker stop my-site-container
              docker rm my-site-container
          }
          
          # 3. รัน Container ใหม่
          docker run -d `
            --name my-site-container `
            -p 8080:80 `
            --restart always `
            my-html-app:latest

      - name: Check Status
        shell: pwsh
        run: docker ps --filter "name=my-site-container"